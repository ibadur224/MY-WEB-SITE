<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death by Scrabble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 22px;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════════════════════════ */
        /*  HERO / LANDING SECTION               */
        /* ══════════════════════════════════════ */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 18vh;
            text-align: center;
        }

        /* Video background */
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Dark overlay for readability */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Hero content */
        .hero-content {
            position: relative;
            z-index: 2;
            color: #fff;
            padding: 20px;
        }
        .hero-content .hero-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 14px;
            opacity: 0.9;
            animation: float 3s ease-in-out infinite;
        }
        .hero-content h1 {
            font-family: 'Georgia', serif;
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }
        .hero-content .hero-line {
            display: block;
            width: 70px;
            height: 3px;
            background: #fff;
            margin: 18px auto;
            opacity: 0.7;
        }
        .hero-content .hero-subtitle {
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ══════════════════════════════════════ */
        /*  ROUND ARROW BUTTON                   */
        /* ══════════════════════════════════════ */
        .enter-btn-wrapper {
            position: relative;
            z-index: 2;
            margin-top: 40px;
        }

        .enter-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .enter-btn .btn-arrow {
            width: 28px;
            height: 28px;
            transition: all 0.4s ease;
            filter: brightness(0) invert(1);
        }

        /* Outer ring pulse */
        .enter-btn::before {
            content: "";
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            animation: pulse-ring 2.5s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.15);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        /* Hover effects */
        .enter-btn:hover {
            background: #fff;
            border-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }
        .enter-btn:hover .btn-arrow {
            filter: brightness(0) invert(0);
            transform: translateX(3px);
        }
        .enter-btn:hover::before {
            animation: none;
            opacity: 0;
        }

        /* Active */
        .enter-btn:active {
            transform: translateY(-1px) scale(0.93);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            html {
                font-size: 18px;
            }
            .hero {
                padding-top: 15vh;
            }
            .hero-content h1 {
                font-size: 3rem;
                letter-spacing: 2px;
            }
            .hero-content .hero-subtitle {
                font-size: 1rem;
                letter-spacing: 4px;
            }
            .hero-content .hero-icon {
                font-size: 3.5rem;
            }
            .enter-btn {
                width: 70px;
                height: 70px;
            }
            .enter-btn .btn-arrow {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════════════ -->
    <!--  HERO LANDING PAGE                   -->
    <!-- ══════════════════════════════════════ -->
    <section class="hero" id="hero">
        <!-- Video Background -->
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- Dark Overlay -->
        <div class="hero-overlay"></div>

        <!-- Hero Text -->
        <div class="hero-content">
            <span class="hero-icon">◈</span>
            <h1>Death by Scrabble</h1>
            <div class="hero-line"></div>
            <p class="hero-subtitle">A Story by Charlie Fish</p>
        </div>

        <!-- Round Arrow Button -->
        <div class="enter-btn-wrapper">
            <a href="qna.html" class="enter-btn">
                <img src="arrow.png" alt="Enter" class="btn-arrow">
            </a>
        </div>
    </section>

</body>
</html>
